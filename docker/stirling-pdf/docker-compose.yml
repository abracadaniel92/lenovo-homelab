name: stirling-pdf

services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "8095:8080"
    volumes:
      - /mnt/ssd_1tb/stirling-pdf/trainingData:/usr/share/tessdata:rw
      - /mnt/ssd_1tb/stirling-pdf/config:/configs:rw
      - /mnt/ssd_1tb/stirling-pdf/customFiles:/customFiles:rw
      - /mnt/ssd_1tb/stirling-pdf/logs:/logs:rw
      - /mnt/ssd_1tb/stirling-pdf/pipeline:/pipeline:rw
    environment:
      TZ: Europe/Skopje
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
