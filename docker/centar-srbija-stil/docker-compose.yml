services:
  centar-srbija-stil:
    build:
      context: "/home/goce/Desktop/Cursor projects/centar-srbija-stil"
      dockerfile: "/home/goce/Desktop/Cursor projects/Pi-version-control/docker/centar-srbija-stil/Dockerfile"
    container_name: centar-srbija-stil
    restart: unless-stopped
    ports:
      - "8084:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - centar_network

networks:
  centar_network:
    driver: bridge
